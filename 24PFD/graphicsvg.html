<body>

 <!--<input id="callsignInput" type="text" placeholder="Apollo-3935">

<div class="panel">
  <h3>Select aircraft</h3>

  <label>Callsign</label>
  <select id="callsignSelect" class="custom-select" onchange="setCallsign()">
    <option value="" disabled selected>SELECT</option>
  </select>
</div>


<div class="pfd-container">
  <svg width="800" height="800"
      viewBox="-400 -400 800 800"
      style="border:1px solid black; background:gray">

    <g id="attitude">

      <!-- Himmel -->
      <rect x="-800" y="-800" width="1600" height="800" fill="skyblue"/>

      <!-- Mark -->
      <rect x="-800" y="0" width="1600" height="800" fill="sienna"/>

      <!-- Horisont -->
      <line x1="-800" y1="0" x2="800" y2="0"
            stroke="white" stroke-width="5"/>

      <!-- Pitch marks -->
      <g id="pitch_marks">
        <line x1="-170" y1="-50" x2="170" y2="-50" stroke="white"
        stroke-width="5"/>
        <line x1="-130" y1="-100" x2="130" y2="-100" stroke="white"
        stroke-width="5"/>
        <line x1="-200" y1="150" x2="200" y2="150" stroke="white"
        stroke-width="5"/>
        <line x1="-200" y1="-150" x2="200" y2="-150" stroke="white"
        stroke-width="5"/>
        <line x1="-170" y1="50" x2="170" y2="50" stroke="white"
        stroke-width="5"/>
        <line x1="-130" y1="100" x2="130" y2="100" stroke="white"
          stroke-width="5"/>
      </g>

    </g>
    <g id ="airplane_symbol">
      <line x1="-100" y1="0" x2="-10" y2="0" stroke="yellow"
        stroke-width="5"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="yellow"
        stroke-width="5"/>
        <line x1="100" y1="0" x2="10" y2="0" stroke="yellow"
        stroke-width="5"/>
    </g>

    <!-- Speed Tape (Left) -->
    <g id="speed_group" transform="translate(-390, -300)">
      <rect x="0" y="0" width="80" height="600" fill="#333" fill-opacity="0.8"/>
      <!-- Red bar for low speed indicator -->
      <!--<rect x="0" y="0" width="10" height="600" fill="red"/>-->
      
      <clipPath id="speed_clip">
        <rect x="0" y="0" width="80" height="600"/>
      </clipPath>
      
      <g clip-path="url(#speed_clip)">
        <g id="speed_tape" transform="translate(0, 300)">
          <!-- Tick marks generated by JS -->
        </g>
      </g>
      
      <!-- Center pointer -->
      <polygon points="10,280 60,280 80,300 60,320 10,320" fill="black" stroke="cyan" stroke-width="2"/>
      <text id="speed_text" x="35" y="308" fill="white" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">0</text>
    </g>

    <!-- Alt Tape (Right) -->
    <g id="alt_group" transform="translate(310, -300)">
      <rect x="0" y="0" width="80" height="600" fill="#333" fill-opacity="0.8"/>
      
      <clipPath id="alt_clip">
        <rect x="0" y="0" width="80" height="600"/>
      </clipPath>
      
      <g clip-path="url(#alt_clip)">
        <g id="alt_tape" transform="translate(0, 300)">
          <!-- Tick marks generated by JS -->
        </g>
      </g>
      
      <!-- Center pointer -->
      <polygon points="70,280 20,280 0,300 20,320 70,320" fill="black" stroke="cyan" stroke-width="2"/>
      <text id="alt_text" x="45" y="308" fill="white" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">0</text>
    </g>

    <!-- Heading Tape (Bottom) -->
    <g id="hdg_group" transform="translate(-250, 340)">
      <rect x="0" y="0" width="500" height="60" fill="#222"/>
      
      <clipPath id="hdg_clip">
        <rect x="0" y="0" width="500" height="60"/>
      </clipPath>
      
      <g clip-path="url(#hdg_clip)">
        <g id="hdg_tape" transform="translate(250, 0)">
        </g>
      </g>
      
      <!-- Center pointer -->
      <line x1="250" y1="0" x2="250" y2="15" stroke="gold" stroke-width="3"/>
      <rect x="225" y="20" width="50" height="25" fill="black"/>
      <text id="hdg_text" x="250" y="38" fill="gold" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">000</text>
    </g>
  </svg>
</div>

<style>

  background-color: gray;
}
.pfd-container {
  display: flex;
  gap: 30px;
  padding: 30px;
}

  width: 100%;

  background: #45a049;

<script>

function setCallsign() {
  activeCallsign = document.getElementById("callsignSelect").value;
  console.log("Tracking:", activeCallsign);

  smoothState.pitch = 0;
  smoothState.roll = 0;
  smoothState.altitude = 0;
  smoothState.groundSpeed = 0;
  

  prevSmoothAlt = null;
  for (const key in gpwsMemory) gpwsMemory[key] = false;
  retardPlayed = false;
}

let activeCallsign = null;

 // function handleData(data) {
  //aircraftState.pitch = data.pitch;
  //aircraftState.roll  = data.roll;
  //aircraftState.heading = data.heading;
  //aircraftState.altitude = data.altitude;
//}

let aircraftState = {
  pitch: 0,
  roll: 0,
  heading: 0,
  altitude: 0,
  groundSpeed: 0
};

let smoothState = {
  pitch: 0,
  roll: 0,
  heading: 0,
  altitude: 0,
  groundSpeed: 0
};

let gpwsMemory = {
  2500: false, 1000: false, 500: false, 400: false, 
  300: false, 200: false, 100: false, 50: false, 
  40: false, 30: false, 20: false, 10: false
};
let prevSmoothAlt = null;
let retardPlayed = false;

function playSound(file) {
  const audio = new Audio(`sounds/${file}`);
  audio.play().catch(e => console.error("Sound play failed:", e));
}

function checkGPWS(currentAlt, currentPitch) {
  if (prevSmoothAlt === null) {
    prevSmoothAlt = currentAlt;
    return;
  }
  
  if (currentAlt > 2600) {
    for (const key in gpwsMemory) gpwsMemory[key] = false;
    retardPlayed = false;
  }

 
  if (currentPitch <= -5) {
    const thresholds = [2500, 1000, 500, 400, 300, 200, 100, 50, 40, 30, 20, 10];
    
    for (let th of thresholds) {
      if (prevSmoothAlt > th && currentAlt <= th && prevSmoothAlt - currentAlt < 500) {
        if (!gpwsMemory[th]) {
          gpwsMemory[th] = true;
          playSound(`${th}.wav`);
        }
      }
    }
    
    // Retard logic
    if (currentAlt <= 25 && currentAlt > 5 && prevSmoothAlt - currentAlt < 500 && !retardPlayed) {
        retardPlayed = true;
        playSound("retard.mp3");
    }
  }

  prevSmoothAlt = currentAlt;
}

const ws = new WebSocket("ws://localhost:8765"); // WS url till backend
ws.onopen = () => {
    console.log("connected to backend");
};
let knownCallsigns = new Set();
ws.onmessage = (event) => {  // Tar hand om inkommande meddelanden
  const data = JSON.parse(event.data);

  
  const select = document.getElementById("callsignSelect");
  Object.keys(data).forEach(callsign => {
   
    const isLikelyCallsign = /^[A-Z].*-/.test(callsign);
    
    if (
      isLikelyCallsign &&
      typeof data[callsign] === 'object' && 
      data[callsign] !== null &&
      data[callsign].hasOwnProperty('altitude') &&
      !knownCallsigns.has(callsign)
    ) {
      knownCallsigns.add(callsign);
      const opt = document.createElement("option");
      opt.value = callsign;
      opt.textContent = callsign;
      select.appendChild(opt);
    }
  });

  if (!activeCallsign) return;
  if (!data[activeCallsign]) return;

  aircraftState.pitch = data[activeCallsign].pitch || 0;
  aircraftState.roll  = data[activeCallsign].roll || 0;
  aircraftState.altitude = data[activeCallsign].altitude || 0;
  aircraftState.groundSpeed = data[activeCallsign].groundSpeed || 0;
  aircraftState.heading = data[activeCallsign].heading || 0;
};
ws.onclose = () => {   // Hanterar stängning av anslutning
    console.log("disconnected from backend");
};
ws.onerror = (err) => {  // loggar om det blir ett fel med WS
  console.error("WS error", err);
}

let PX_PER_DEG = 5

const attitude = document.getElementById("attitude");

function updateTape(group, value, scale, majorStep, minorStep, isRight) {
  let html = "";
  // Draw major bounds
  let minVal = Math.floor((value - 300 / scale) / majorStep) * majorStep;
  let maxVal = Math.ceil((value + 300 / scale) / majorStep) * majorStep;
  
  for (let v = minVal; v <= maxVal; v += minorStep) {
    if (v < 0 && !isRight) continue; // no negative speed by default

    let y = (value - v) * scale;
    if (y < -300 || y > 300) continue;
    
    let isMajor = (v % majorStep === 0);
    let tickLen = isMajor ? 15 : 8;
    
    if (isRight) {
      // right tape (Altitude)
      html += `<line x1="0" y1="${y}" x2="${tickLen}" y2="${y}" stroke="white" stroke-width="2"/>`;
      if (isMajor) {
        html += `<text x="${tickLen + 5}" y="${y + 6}" fill="white" font-family="sans-serif" font-size="16" font-weight="bold">${v}</text>`;
      }
    } else {
      // left tape (Speed)
      html += `<line x1="${80 - tickLen}" y1="${y}" x2="80" y2="${y}" stroke="white" stroke-width="2"/>`;
      if (isMajor) {
        html += `<text x="${80 - tickLen - 5}" y="${y + 6}" fill="white" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="end">${v}</text>`;
      }
    }
  }
  group.innerHTML = html;
}

function updateHdgTape(group, value, scale, majorStep, minorStep) {
  let html = "";
  // Draw major bounds
  let minVal = Math.floor((value - 250 / scale) / minorStep) * minorStep;
  let maxVal = Math.ceil((value + 250 / scale) / minorStep) * minorStep;
  
  for (let v = minVal; v <= maxVal; v += minorStep) {
    let x = (v - value) * scale;
    if (x < -250 || x > 250) continue;
    
    let isMajor = (v % majorStep === 0);
    let tickLen = isMajor ? 12 : 6;
    
    html += `<line x1="${x}" y1="0" x2="${x}" y2="${tickLen}" stroke="white" stroke-width="2"/>`;
    if (isMajor) {
      // Normalize heading to 0-359 interval
      let displayHeading = ((v % 360) + 360) % 360;
      let label = displayHeading;
      if (displayHeading === 0) label = "N";
      else if (displayHeading === 90) label = "E";
      else if (displayHeading === 180) label = "S";
      else if (displayHeading === 270) label = "W";
      else label = String(displayHeading).padStart(3, '0');
      
      html += `<text x="${x}" y="${tickLen + 15}" fill="white" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">${label}</text>`;
    }
  }
  group.innerHTML = html;
}

function update() {
  const pitch_px = smoothState.pitch * PX_PER_DEG;

  attitude.setAttribute(
    "transform",
    `translate(0, ${pitch_px}) rotate(${smoothState.roll})`
  );

  // Update speed tape (5 units per mark, 20 per text label, scale)
  updateTape(document.getElementById("speed_tape"), smoothState.groundSpeed, 3, 20, 10, false);
  document.getElementById("speed_text").textContent = Math.round(smoothState.groundSpeed);

  // Update altitude tape (10 units per mark, 100 per text label, scale)
  updateTape(document.getElementById("alt_tape"), smoothState.altitude, 1.5, 100, 20, true);
  document.getElementById("alt_text").textContent = Math.round(smoothState.altitude);

  // Update heading tape (10 units per mark, 30 per text label, scale)
  updateHdgTape(document.getElementById("hdg_tape"), smoothState.heading, 4, 30, 10);
  let hdgLabel = Math.round(smoothState.heading);
  if (hdgLabel === 360) hdgLabel = 0;
  document.getElementById("hdg_text").textContent = String(hdgLabel).padStart(3, '0');
}

// 60 FPS render loop for smooth interpolation
function renderLoop() {
  // Interpolation factor (closer to 1 = faster, closer to 0 = smoother)
  const factor = 0.1;
  smoothState.pitch += (aircraftState.pitch - smoothState.pitch) * factor;
  smoothState.roll += (aircraftState.roll - smoothState.roll) * factor;
  smoothState.altitude += (aircraftState.altitude - smoothState.altitude) * factor;
  smoothState.groundSpeed += (aircraftState.groundSpeed - smoothState.groundSpeed) * factor;

  // Angular interpolation for heading (handles 0-359 wrap around)
  let hdgDiff = aircraftState.heading - smoothState.heading;
  if (hdgDiff > 180) hdgDiff -= 360;
  if (hdgDiff < -180) hdgDiff += 360;
  smoothState.heading += hdgDiff * factor;
  
  // Normalize smoothState.heading into [0, 360)
  smoothState.heading = ((smoothState.heading % 360) + 360) % 360;

  update();
  checkGPWS(smoothState.altitude, smoothState.pitch);
  requestAnimationFrame(renderLoop);
}

requestAnimationFrame(renderLoop);

</script>
